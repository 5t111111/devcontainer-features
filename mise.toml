[tools]
node = "24"
"npm:@devcontainers/cli" = "latest"

[tool_alias]
devcontainer = "npm:@devcontainers/cli"

[tasks.generate-docs]
description = "Generate the features documentation"
run = "devcontainer features generate-docs -n 5t111111/devcontainer-features -p src"

[tasks.test]
description = "Run all the features tests"
run = "devcontainer features test --skip-autogenerated --skip-duplicated ."

[tasks.test-claude-code]
description = "Run the Claude Code features tests"
run = "devcontainer features test -f claude-code --skip-autogenerated --skip-duplicated ."

[tasks.test-rust-extra]
description = "Run the Rust Extra features tests"
run = "devcontainer features test -f rust-extra --skip-autogenerated --skip-duplicated ."

[tasks.test-mise]
description = "Run the Mise features tests"
run = "devcontainer features test -f mise --skip-autogenerated --skip-duplicated ."
